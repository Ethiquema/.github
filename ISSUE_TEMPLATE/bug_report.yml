name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of AstralEmu is affected?
      options:
        - Image / System
        - Emulator (standalone)
        - Emulator (RetroArch core)
        - EmulationStation DE
        - Performance Manager (governor / overclock)
        - Service Management (XFCE / Plasma Mobile / Kodi / Waydroid)
        - Package Repository
        - Image Builder / CI
        - Update System
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device
      description: What hardware are you running on?
      placeholder: "e.g. Raspberry Pi 5, Orange Pi 5, ROG Ally, etc."
    validations:
      required: true

  - type: dropdown
    id: base-distro
    attributes:
      label: Base Distribution
      description: Which base image are you using?
      options:
        - Ubuntu
        - Debian
        - Arch Linux
        - Universal Blue (Fedora)
        - Unknown / Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Image Version / Date
      description: The image version or build date (check in system settings or filename)
      placeholder: "e.g. 2026-02-15 or v1.2.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this behavior?
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste any relevant logs or attach screenshots
      render: text

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: This does not involve pirated content or copyrighted material
          required: true
